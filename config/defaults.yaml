llm:
  provider: chatgpt_oauth        # chatgpt_oauth | anthropic
  chatgpt_oauth_model: gpt-5.5
  chatgpt_oauth_reasoning_effort: low
  draft_model: claude-sonnet-4-6

mongodb:
  database: deal_intel
  vector_search: python_cosine   # python_cosine | atlas (atlas requires M10+ cluster)

# MEDDPICC health score 계산 가중치.
# health_pct = sum(score_i * weight_i) / sum(5 * weight_i) * 100
# ML 자동조정 시 이 섹션만 ~/.deal-intel/config.yaml로 override.
meddpicc:
  weights:
    metrics:          1.0
    economic_buyer:   1.5
    decision_criteria: 1.0
    decision_process: 1.0
    identify_pain:    1.5
    champion:         2.0
    competition:      0.5
  gap_threshold: 2    # 이 점수 미만이면 gap으로 분류

# 미팅 노트 시맨틱 임베딩 설정 (Vector Search용).
# sentence-transformers 로컬 실행 — API key 불필요.
# ~/.deal-intel/config.yaml 에서 모델 override 가능.
embedding:
  model: all-MiniLM-L6-v2   # 384 dims, ~90MB 1회 다운로드, CPU 실행 가능

# 딜 파이프라인 stuck 기준 (일 단위).
# stuck_threshold_days_by_stage가 우선, 없는 stage는 default 사용.
pipeline:
  stuck_threshold_days: 14
  stuck_threshold_days_by_stage:
    discovery:     7
    qualification: 14
    proposal:      21
    negotiation:   30
    stalled:       30
    won:           0   # terminal — stuck 판정 없음
    lost:          0   # terminal — stuck 판정 없음

# BI metric classification. Override in ~/.deal-intel/config.yaml as operating
# data accumulates; these bands describe MEDDPICC qualification, not win probability.
metrics:
  health_bands:
    healthy_min: 70
    watch_min: 40
