llm:
  provider: chatgpt_oauth        # chatgpt_oauth | anthropic | openai_api
  chatgpt_oauth_model: gpt-5.5
  chatgpt_oauth_reasoning_effort: low
  openai_api_model: gpt-5.4-mini
  openai_api_reasoning_effort: low
  draft_model: claude-sonnet-4-6

mongodb:
  database: recruit_ai
  demo_database: recruit_ai_demo
  vector_search: python_cosine   # python_cosine | atlas (atlas requires M10+ cluster)

storage:
  backend: mongo                  # mongo | local_sample
  local_data_dir: ~/.recruit-ai/local-data

tools:
  surface: auto                   # auto | sample | standard | developer

user_memory:
  dir: user_docs                  # Relative paths resolve from the current workspace.

reporting:
  timezone: Asia/Seoul
  output_dir: ~/.recruit-ai/reports
  language: en                    # en | ko

deal_value:
  default_currency: KRW

# Legacy MEDDPICC compatibility health score weights.
# health_pct = sum(score_i * weight_i) / sum(5 * weight_i) * 100
# For v2 qualification framework customization, copy a built-in preset into a
# new framework key instead of mutating the preset.
meddpicc:
  weights:
    metrics:          1.0
    economic_buyer:   1.5
    decision_criteria: 1.0
    decision_process: 1.0
    identify_pain:    1.5
    champion:         2.0
    competition:      0.5
  gap_threshold: 2    # Scores below this threshold are treated as gaps.

# Meeting-note summary embedding settings for vector search.
# Runs locally with sentence-transformers, without an API key.
# Override the model in ~/.recruit-ai/config.yaml if needed.
embedding:
  model: all-MiniLM-L6-v2   # 384 dims, ~90MB first download, CPU friendly.

# Seller-side product/solution knowledge used as RAG context for LLM tools.
# This is intentionally separate from customer evidence: it may guide
# interpretation, but must not directly raise qualification scores or customer
# theme counts.
product_context:
  enabled: true
  source_dirs:
    - ~/.recruit-ai/product-context/sources
  cache_dir: ~/.recruit-ai/product-context/cache
  # Large product catalogs are allowed, but indexing still has chunk budgets so
  # one oversized file cannot consume an entire MCP session.
  max_source_file_mb: 100
  max_note_mb: 5
  max_chunks_per_file: 2000
  max_chunks_per_run: 8000
  retrieval:
    top_k: 5
    max_context_chars: 6000
  file_types:
    - txt
    - md
    - json
    - csv
    - pdf
    - docx

# Pipeline stuck and expected-close defaults, in days.
# Stage-specific stuck thresholds override the default when present.
pipeline:
  # Used only when the user does not provide an expected close date.
  expected_close:
    default_days: 7
    # Exact customer_segment string match, case-insensitive. Checked before
    # industry overrides. Example: public_sector: 60, enterprise: 28
    days_by_segment: {}
    # Exact industry string match, case-insensitive. Use only true verticals.
    # Example: Government: 60, Manufacturing: 28
    days_by_industry: {}
  stuck_threshold_days: 14
  stuck_threshold_days_by_stage:
    discovery:     7
    qualification: 14
    proposal:      21
    negotiation:   30

# BI metric classification. Override in ~/.recruit-ai/config.yaml as operating
# data accumulates; these bands describe MEDDPICC qualification, not win probability.
metrics:
  health_bands:
    healthy_min: 70
    watch_min: 40
  overdue:
    grace_days: 0
  win_rate:
    minimum_closed_sample: 10

# Deal review interpretation. These thresholds control evidence coverage and
# uncertainty messaging; they do not estimate win probability.
deal_review:
  evidence_coverage:
    low_max: 40
    high_min: 70

# LLM usage visibility.
# get_usage always reports token counts from persisted tool metadata. Cost is
# estimated only when pricing is configured here or in ~/.recruit-ai/config.yaml.
# ChatGPT OAuth is treated as subscription-backed with zero incremental API
# estimate because it does not bill through an API key.
usage:
  pricing: {}
