name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run release-targeted tests
        run: |
          python -m pytest \
            tests/test_bootstrapper_skeleton.py \
            tests/test_mcpb_manifest.py \
            tests/test_tool_surfaces.py \
            -q -p no:cacheprovider

      - name: Run package smoke
        run: python -m deal_intel.cli smoke-profile --profile sample

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Check npm bootstrapper package
        working-directory: npm
        run: |
          npm pack --dry-run
          npm run smoke

  publish-python:
    name: Publish Python package to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    name: Publish npm bootstrapper
    runs-on: ubuntu-latest
    needs: publish-python
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm package
        working-directory: npm
        run: npm publish --access public --provenance
