name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node for bootstrapper tests
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check src tests

      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider --basetemp .tmp/pytest-ci

      - name: Run sample profile smoke
        run: python -m deal_intel.cli smoke-profile --profile sample

  node:
    name: npm bootstrapper
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Check bootstrapper syntax
        run: node --check npm/bin/deal-intel-mcp.js

      - name: Check npm package contents
        working-directory: npm
        run: npm pack --dry-run

      - name: Run npm bootstrapper smoke
        working-directory: npm
        run: npm run smoke
