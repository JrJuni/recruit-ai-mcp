name: Staging Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Published package version to install, without a leading v"
        required: true
        type: string
      source:
        description: "Package registry source"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  installed-package-smoke:
    name: Installed package smoke
    runs-on: ubuntu-latest
    env:
      RECRUIT_AI_STORAGE_BACKEND: local_sample
      RECRUIT_AI_TOOLS_SURFACE: sample
      PACKAGE_SOURCE: ${{ inputs.source }}
      PACKAGE_VERSION: ${{ inputs.version }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package from selected registry
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p smoke-evidence

          if [[ -z "$PACKAGE_VERSION" || "$PACKAGE_VERSION" == v* ]]; then
            echo "::error::version must be a package version like 0.1.0, without a leading v"
            exit 1
          fi

          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip

          package_spec="recruit-ai-mcp[embedding]==${PACKAGE_VERSION}"
          if [[ "$PACKAGE_SOURCE" == "testpypi" ]]; then
            python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "$package_spec"
          else
            python -m pip install "$package_spec"
          fi

      - name: Run sample profile and MCP tool smoke
        shell: bash
        run: |
          set -euo pipefail
          . .venv-smoke/bin/activate

          python - <<'PY' | tee smoke-evidence/package.json
          import importlib.metadata as metadata
          import json
          import os
          import sys

          requested = os.environ["PACKAGE_VERSION"]
          installed = metadata.version("recruit-ai-mcp")
          payload = {
              "ok": installed == requested,
              "source": os.environ["PACKAGE_SOURCE"],
              "requested_version": requested,
              "installed_version": installed,
          }
          print(json.dumps(payload, indent=2, sort_keys=True))
          if installed != requested:
              sys.exit(1)
          PY

          python -m deal_intel.cli smoke-profile --profile sample --json \
            | tee smoke-evidence/profile-smoke.json

          python -m deal_intel.cli smoke-natural-questions \
            --pack recruiting \
            --as-of 2026-06-22 \
            --json \
            | tee smoke-evidence/recruiting-natural-questions.json

          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path("smoke-evidence/recruiting-natural-questions.json").read_text(
                  encoding="utf-8"
              )
          )
          questions = {item["id"]: item for item in payload["questions"]}
          metrics = questions["rq01_recruiting_pipeline_metrics"]["payload"]["summary"]
          persistence = questions["rq11_local_recruiting_persistence"]["payload"]["summary"]
          guardrails = questions["rq12_recommendation_guardrails"]["payload"]["summary"]
          shortlist = questions["rq13_client_shortlist_readiness"]["payload"]["summary"]
          expected = {
              "ok": True,
              "question_count": 13,
              "candidate_count": 8,
              "written_record_count": 27,
              "reloaded_record_count": 27,
              "guardrail_candidate_count": 4,
              "open_position_count": 2,
              "positions_with_shortlist": 2,
          }
          actual = {
              "ok": payload["ok"],
              "question_count": payload["question_count"],
              "candidate_count": metrics["candidate_count"],
              "written_record_count": persistence["written_record_count"],
              "reloaded_record_count": persistence["reloaded_record_count"],
              "guardrail_candidate_count": guardrails["guardrail_candidate_count"],
              "open_position_count": shortlist["open_position_count"],
              "positions_with_shortlist": shortlist["positions_with_shortlist"],
          }
          if actual != expected:
              raise SystemExit(
                  "Recruiting natural-question smoke contract mismatch: "
                  f"expected={expected!r}, actual={actual!r}"
              )
          PY

          python - <<'PY' | tee smoke-evidence/mcp-tools.json
          import asyncio
          import json
          import sys

          from deal_intel import mcp_server

          REQUIRED_TOOLS = {
              "config_doctor",
              "get_tool_catalog",
              "create_candidate",
              "add_recruiting_interaction",
              "recommend_candidates_for_position",
              "get_recruiting_metrics",
          }

          async def main() -> int:
              tools = await mcp_server.app.list_tools()
              names = sorted(tool.name for tool in tools)
              missing = sorted(REQUIRED_TOOLS.difference(names))
              payload = {
                  "ok": not missing,
                  "tool_count": len(names),
                  "required_tools": sorted(REQUIRED_TOOLS),
                  "missing_tools": missing,
                  "tools": names,
              }
              print(json.dumps(payload, indent=2, sort_keys=True))
              return 1 if missing else 0

          raise SystemExit(asyncio.run(main()))
          PY

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-evidence-${{ inputs.source }}-${{ inputs.version }}
          path: smoke-evidence/
          if-no-files-found: warn
